<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Werewolf App</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="app">
    <div class="editions">
        <div id="werewolf-edition" class="Werewolves">Werwölfe</div>
        <div id="alien-edition" class="Aliens">Aliens</div>
    </div>

    <div class="roles-grid"></div>

    <div class="bottom-bar">
        <div class="timer-box">
            <div class="timer-label">Timer (Spiel)</div>
            <div class="timer-time">05:00</div>
        </div>
        <button class="start-button">Start</button>
        <button class="settings-button">⚙️</button>
    </div>

    <div class="night-phase">
        <div class="night-content">
            <img class="image" alt="role image" src="./images/villager.png">
            <div id="night-phase-text"></div>
        </div>
        <div class="buttons">
            <button id="pause-button">Pause</button>
            <button id="stop-button">Stop</button>
        </div>
    </div>
</div>

<script src="main.js" type="module" defer></script>
</body>
</html>
