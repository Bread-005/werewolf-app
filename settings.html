<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" crossorigin="anonymous" href="https://core.ontavio.de/font-awesome/6.4.0/css/all.min.css"/>
    <title>Settings</title>
</head>

<body>
<div class="settings-page">
    <div class="back-button">
        <a href="main.html">
            <button><i class="fa-solid fa-square-left"></i></button>
        </a>
    </div>
    <div class="timer">
        <div>
            <label for="action-time-input">Action Time</label>
            <input id="action-time-input" type="number" min="1" max="10">
        </div>
        <div>
            <label for="voting-time-input">Voting Time (in seconds)</label>
            <input id="voting-time-input" type="number" min="5" max="600">
        </div>
    </div>
</div>
<script src="settings.js" type="module" defer></script>
</body>
</html>
